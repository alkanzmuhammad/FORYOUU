<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      flex-direction: column;
    }

    h1 {
      color: white;
      font-size: 3em;
      opacity: 0;
      transition: 0.5s;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #e63950;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <button onclick="showLove()">Klik Aku ❤️</button>
  <h1 id="loveText">I LOVE YOU 💖</h1>

  <!-- Lagu -->
  <audio id="loveSong" src="lagu.mp3"></audio>

  <script>
    function showLove() {
      const text = document.getElementById("loveText");
      const song = document.getElementById("loveSong");

      text.style.opacity = 1;
      text.style.transform = "scale(1.2)";

      song.play(); // mainkan lagu

      setTimeout(() => {
        text.style.transform = "scale(1)";
      }, 200);
    }
  </script>

</body>
</html>
